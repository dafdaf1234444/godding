name: godding-swarm

on:
  schedule:
    - cron: '4 8 * * *'   # 08:04 UTC daily ≈ 09:04 UK / 10:04 NL summer
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: godding-swarm
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: strip NUL bytes (OneDrive sync artefact)
        id: strip_nul
        run: |
          python - <<'PY'
          import glob, os
          fixed = []
          patterns = ['pages/*.html','assets/*.css','assets/*.js','swarm/*.py','index.html']
          for pat in patterns:
              for f in sorted(glob.glob(pat)):
                  with open(f,'rb') as fh: d = fh.read()
                  if b'\x00' in d:
                      n = d.count(b'\x00')
                      with open(f,'wb') as fh: fh.write(d.replace(b'\x00', b''))
                      fixed.append((f, n))
          if fixed:
              print('cleaned NUL bytes from:')
              for f, n in fixed: print(f'  {f}  ({n} bytes)')
              with open(os.environ['GITHUB_OUTPUT'],'a') as g: g.write('cleaned=true\n')
          else:
              print('no NUL bytes found.')
              with open(os.environ['GITHUB_OUTPUT'],'a') as g: g.write('cleaned=false\n')
          PY

      - name: commit NUL-bytes cleanup if any
        if: steps.strip_nul.outputs.cleaned == 'true'
        run: |
          git config user.name  "godding-swarm"
          git config user.email "swarm@godding.local"
          git add -A
          git commit -m "swarm: strip OneDrive NUL-byte corruption" --quiet || true
          git push --quiet || true

      - name: restore truncated HTML files from HEAD
        run: |
          # OneDrive sync occasionally truncates files mid-tag on the user's
          # Windows machine. Any HTML file not ending in </html> is restored
          # from the last committed version so future swarm runs see a
          # well-formed page.
          set +e
          truncated=()
          for f in pages/*.html index.html; do
            if [ -f "$f" ] && ! tail -c 50 "$f" | grep -q "</html>"; then
              echo "restoring truncated $f"
              git checkout HEAD -- "$f" && truncated+=("$f")
            fi
          done
          if [ ${#truncated[@]} -gt 0 ]; then
            echo "restored ${#truncated[@]} files"
          else
            echo "no truncations detected"
          fi

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests || true
          # playwright is optional — uncomment to enable visual QA
          # pip install playwright
          # python -m playwright install --with-deps chromium

      - name: serve site (background)
        run: |
          nohup python serve.py > /tmp/serve.log 2>&1 &
          # wait for it to be ready
          for i in {1..20}; do
            curl -fs http://127.0.0.1:8000/ >/dev/null && break
            sleep 0.5
          done

      - name: run loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python swarm/loop.py

      - name: run share-kit generator
        run: python swarm/share.py

      - name: run grouper
        run: python swarm/group.py

      - name: build likelihood graph (linker)
        run: python swarm/linker.py

      - name: rebuild search index
        run: python swarm/indexer.py

      - name: regenerate self-docs + demo
        run: python swarm/docs.py

      - name: deep audit
        run: python swarm/audit.py

      - name: verify links
        run: python swarm/verify_links.py

      # Optional: run visual QA against the local server.
      # Enable by installing Playwright in the deps step above.
      - name: visual qa (optional)
        run: |
          if python -c "import playwright" 2>/dev/null; then
            GODDING_BASE=http://127.0.0.1:8000 python swarm/visual_qa.py
          else
            echo "playwright not installed, skipping"
          fi

      - name: commit + push
        run: |
          git config user.name  "godding-swarm"
          git config user.email "swarm@godding.local"
          git add data/ pages/demo.html pages/ changelog/ || true
          if git diff --cached --quiet; then
            echo "no changes this run"
          else
            git commit -m "swarm: scheduled run $(date -u +%FT%TZ)" --quiet
            git push --quiet
          fi

      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swarm-run-${{ github.run_id }}
          path: |
            data/audit.json
            data/share_kit.json
            data/groups.json
            data/links.json
            data/last_run.json
            data/visual_qa.json
          retention-days: 30
